apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexushr-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexushr-backend
  template:
    metadata:
      labels:
        app: nexushr-backend
    spec:
      containers:
      - name: backend
        image: nexushr-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres-service:5432/nexushr
        - name: SPRING_DATASOURCE_USERNAME
          value: postgres
        - name: SPRING_DATASOURCE_PASSWORD
          value: password
---
apiVersion: v1
kind: Service
metadata:
  name: nexushr-backend-service
spec:
  selector:
    app: nexushr-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
